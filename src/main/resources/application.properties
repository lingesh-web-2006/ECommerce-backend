spring.application.name=Ecommerce

# Server Configuration
server.port=${PORT:8085}
server.servlet.context-path=/api

# MySQL Database Configuration (env vars for Railway, fallbacks for local)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ecommerce}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Mysql@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwtSecret=9a02115a835ee03d5fb83cd8a468533e462719a8d5f303023d8c112233445566
app.jwtExpirationInMs=86400000
